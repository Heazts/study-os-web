# Blueprint do Render (render.com/docs/blueprint-spec) para o backend.
# Uso: no Render, "New +" -> "Blueprint" -> aponte para este repositório.
# Ele configura o Web Service sozinho; só falta preencher DATABASE_URL
# manualmente (veja backend/.env.example) porque isso não pode ser gerado
# automaticamente - é a connection string do seu Postgres (Supabase/Neon).
services:
  - type: web
    name: study-os-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
