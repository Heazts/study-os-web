<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Study OS - Plataforma completa para estudantes com IA, planejamento e gamificação">
    <title>Study OS — Sua plataforma de estudos inteligente</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E">

    <!-- O GitHub Pages serve arquivos estáticos sem deixar configurar headers
         HTTP customizados (diferente de Netlify/Vercel) — por isso a Content
         Security Policy e a política de referrer vão aqui, via <meta>, em vez
         de nginx.conf ou do middleware do backend (que só cobre respostas da
         API, não esta página). Ajuste as origens abaixo se adicionar algum
         CDN/serviço novo, senão o navegador bloqueia silenciosamente. -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://cdn.tailwindcss.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
        font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com;
        img-src 'self' data:;
        connect-src 'self' https://study-os-backend-w8o0.onrender.com https://api.enem.dev;
        base-uri 'self';
        form-action 'self';
    ">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <!-- Fonte: Inter, metricamente compatível com San Francisco/SF Pro — em
         dispositivos Apple, -apple-system/BlinkMacSystemFont (ver styles.css)
         já usa a fonte nativa do sistema; Inter é o fallback em todo o resto. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="root" class="min-h-screen"></div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/state.js"></script>
    <script src="js/components.js"></script>
    <script src="js/screens.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
